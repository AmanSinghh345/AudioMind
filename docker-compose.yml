services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      AUDIOMIND_DATA_DIR: /app/data
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
