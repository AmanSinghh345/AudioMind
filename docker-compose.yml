services:
  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports: ["8000:8000"]
    volumes: ["audiomind-data:/app/data"]
  web:
    build: .
    command: streamlit run streamlit_app.py --server.address 0.0.0.0
    env_file: .env
    ports: ["8501:8501"]
    volumes: ["audiomind-data:/app/data"]
volumes:
  audiomind-data:
