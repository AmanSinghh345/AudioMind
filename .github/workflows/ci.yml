name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -r apps/api/requirements.txt
      - run: python -m py_compile apps/api/api.py apps/api/streamlit_app.py apps/api/audiomind/*.py scripts/*.py
      - run: pytest -q
        working-directory: apps/api
